name: "Viking"
version: 1

fonts:
  heading:
    file: "Cinzel-Regular.ttf"
    size-mm: 6.0
  body:
    file: "Cinzel-Regular.ttf"
    size-mm: 3.5

layout:
  padding-mm: 4
  icon-box-mm: 14
  meta-block:
    line-spacing-mm: 4.2
    max-lines: 3

border:
  long-side:
    left-cap: "viking_longside_cap_left.svg"
    tile: "viking_longside_tile.svg"
    right-cap: "viking_longside_cap_right.svg"
    tile-advance-mm: 8
    overlap-mm: 0.2
    mirror-every-other: true